manifest:
  remotes:
    - name: ncs
      url-base: https://github.com/nrfconnect
  
  group-filter:
    - +sdk-knx-iot-stack

  defaults:
    remote: ncs
 
  projects:
    - name: nrf
      remote: ncs
      repo-path: sdk-nrf
      revision: v3.3.0
      import: true

    - name: sdk-knx-iot-stack
      repo-path: sdk-knx-iot-point-api-stack
      path: modules/lib/sdk-knx-iot-stack
      revision: pull/1/head
      submodules:
        - path: deps/tinycbor
      groups:
        - sdk-knx-iot-stack
