# ---------------------------------------------------------------------------
# Shared OpenThread configuration + hardcoded "automatic" lab dataset.
# Native OpenThread
# ---------------------------------------------------------------------------

CONFIG_NRF_802154_RADIO_DRIVER=y
CONFIG_OPENTHREAD=y

CONFIG_OPENTHREAD_MANUAL_START=n

CONFIG_OPENTHREAD_FTD=y
CONFIG_OPENTHREAD_COAP=y
CONFIG_OPENTHREAD_SHELL=y
CONFIG_OPENTHREAD_SRP_CLIENT=y
CONFIG_OPENTHREAD_ECDSA=y
CONFIG_OPENTHREAD_THREAD_VERSION_1_4=y
CONFIG_OPENTHREAD_THREAD_STACK_SIZE=8192
CONFIG_OPENTHREAD_NUM_MESSAGE_BUFFERS=256
CONFIG_OPENTHREAD_EXTERNAL_HEAP=y
CONFIG_OPENTHREAD_MAC_FILTER=y
CONFIG_OPENTHREAD_IP6_FRAGM=y

# Hardcoded lab dataset: every board with this conf forms/joins the same Thread
# network on boot with no commissioner.
CONFIG_OPENTHREAD_PANID=4813
CONFIG_OPENTHREAD_CHANNEL=20
CONFIG_OPENTHREAD_NETWORK_NAME="knx-lab"
CONFIG_OPENTHREAD_XPANID="de:ad:00:be:ef:00:ca:fe"
CONFIG_OPENTHREAD_NETWORKKEY="ae:f0:08:f1:9a:cb:ad:8b:9e:a3:7e:74:90:dd:8c:04"
