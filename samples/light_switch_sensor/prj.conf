CONFIG_KNX_IOT_ADD_ON=y

# MVP: hardcode identity + group tables + a shared group OSCORE key so the
# sensor and actuator talk with no ETS / commissioner (subsys/knx/knx_presets.c).
CONFIG_KNX_HARDCODED_COMMISSIONING=y

# OSCORE replay protection uses the CoAP Echo option: on first contact a server
# answers an s-mode write with a 4.01 + Echo challenge and defers the write until
# the sender re-requests with that Echo. That handshake needs commissioned/
# persisted replay state (ETS/SRP) and a unicast request/response transaction.
# Our hardcoded sensor fires NON multicast s-mode, so it cannot complete the
# handshake -> the actuator re-challenges forever and the write is never applied.
# Disable it for the hardcoded MVP; revisit when real commissioning lands.
CONFIG_OC_REPLAY_PROTECTION_ENABLED=n

CONFIG_MAIN_STACK_SIZE=4096

# Persistent storage backend.
CONFIG_ZMS=y
CONFIG_SETTINGS_ZMS=y

CONFIG_GPIO=y
CONFIG_DK_LIBRARY=y

CONFIG_SHELL=y

# Crypto workaround (policy): libknx's PSA SPAKE2+ path still uses legacy
# mbedTLS ECP/bignum types and math for the EC operations (PSA is used only for
# PBKDF2 and the DRBG). In NCS (mbedTLS v4) those identifiers are private; this
# deprecated-but-functional flag re-exposes them and pulls in the nrf_security
# legacy compat sources so the stack links.
CONFIG_MBEDTLS_DECLARE_PRIVATE_IDENTIFIERS=y

CONFIG_MBEDTLS_HEAP_SIZE=30000

CONFIG_LOG=y
CONFIG_KNX_LOG_TO_ZEPHYR=y
CONFIG_LIB_KNX_LOG_LEVEL=4

CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=4096
CONFIG_OC_PRINT_ENABLED=y
